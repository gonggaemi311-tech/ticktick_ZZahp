<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오늘할일</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C1B1F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="오늘할일">
<style>
  :root{
    --bg:#1C1B1F;
    --paper:#F7F5F0;
    --paper-soft:#EDEAE2;
    --ink:#2A2825;
    --ink-soft:#6B6660;
    --line:#DEDAD0;
    --accent:#D97757;
    --accent-soft:#F1DCCF;
    --danger:#C0392B;
    --warn:#D97757;
    --safe:#8C8780;
    --good:#5B8C5A;
    --radius:16px;
    --radius-sm:10px;
    --font-scale:1;
    --fs-base: calc(15px * var(--font-scale));
    --fs-sm: calc(12.5px * var(--font-scale));
    --fs-lg: calc(18px * var(--font-scale));
    --fs-xl: calc(24px * var(--font-scale));
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; overscroll-behavior-y:none;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-size:var(--fs-base);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    user-select:none;
  }
  input, textarea{user-select:text;}

  .mono{
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    letter-spacing:-0.02em;
  }

  #app{
    max-width:480px;
    margin:0 auto;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    position:relative;
    overflow:hidden;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    padding: calc(14px + var(--safe-top)) 18px 12px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .topbar h1{
    color:var(--paper);
    font-size:var(--fs-xl);
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .topbar .date-sub{
    color:#8B8780;
    font-size:var(--fs-sm);
    margin-top:2px;
  }
  .icon-btn{
    width:38px; height:38px;
    border-radius:50%;
    background:#2A2832;
    border:none;
    color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  .icon-btn:active{background:#3A3742;}

  /* ---------- Main scroll area ---------- */
  .main-scroll{
    flex:1;
    overflow-y:auto;
    background:var(--paper);
    border-radius:24px 24px 0 0;
    padding: 18px 16px calc(18px);
    -webkit-overflow-scrolling:touch;
  }
  .main-scroll::-webkit-scrollbar{display:none;}

  .section-title{
    font-size:var(--fs-sm);
    font-weight:700;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin: 4px 2px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-title .count{
    font-family:"SF Mono",monospace;
    color:var(--accent);
    font-weight:600;
  }

  /* ---------- D-day strip (signature element) ---------- */
  .dday-strip{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding: 2px 2px 14px;
    margin-bottom:6px;
    -webkit-overflow-scrolling:touch;
  }
  .dday-strip::-webkit-scrollbar{display:none;}
  .dday-chip{
    flex-shrink:0;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px;
    min-width:108px;
    display:flex;
    flex-direction:column;
    gap:6px;
    position:relative;
    overflow:hidden;
  }
  .dday-chip::before{
    content:'';
    position:absolute; left:0; top:0; bottom:0;
    width:4px;
    background:var(--safe);
  }
  .dday-chip.urgent::before{background:var(--danger);}
  .dday-chip.soon::before{background:var(--warn);}
  .dday-chip .dday-num{
    font-family:"SF Mono",monospace;
    font-size:var(--fs-lg);
    font-weight:700;
    color:var(--ink);
    line-height:1;
  }
  .dday-chip.urgent .dday-num{color:var(--danger);}
  .dday-chip.soon .dday-num{color:var(--accent);}
  .dday-chip .dday-label{
    font-size:var(--fs-sm);
    color:var(--ink-soft);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:90px;
  }
  .dday-empty{
    color:var(--ink-soft);
    font-size:var(--fs-sm);
    padding:14px 4px;
  }

  /* ---------- Task list ---------- */
  .task-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:12px 12px;
    margin-bottom:8px;
    display:flex;
    align-items:flex-start;
    gap:10px;
  }
  .checkbox{
    width:22px; height:22px;
    border-radius:50%;
    border:2px solid var(--ink-soft);
    flex-shrink:0;
    margin-top:1px;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s ease;
  }
  .checkbox.checked{
    background:var(--good);
    border-color:var(--good);
    color:white;
    font-size:12px;
  }
  .task-body{flex:1; min-width:0;}
  .task-title{
    font-size:var(--fs-base);
    font-weight:500;
    color:var(--ink);
    word-break:break-word;
  }
  .task-title.done{
    color:var(--ink-soft);
    text-decoration:line-through;
  }
  .task-meta{
    display:flex; align-items:center; gap:6px;
    margin-top:4px;
    flex-wrap:wrap;
  }
  .tag-pill{
    font-size:var(--fs-sm);
    padding:2px 8px;
    border-radius:8px;
    background:var(--paper-soft);
    color:var(--ink-soft);
  }
  .prio-pill{
    font-size:var(--fs-sm);
    padding:2px 8px;
    border-radius:8px;
    font-weight:600;
  }
  .prio-high{background:#F4DCD8; color:var(--danger);}
  .prio-mid{background:var(--accent-soft); color:var(--accent);}
  .prio-low{background:#E2E8DD; color:var(--good);}
  .due-pill{
    font-size:var(--fs-sm);
    font-family:"SF Mono",monospace;
    color:var(--ink-soft);
  }
  .due-pill.urgent{color:var(--danger); font-weight:700;}
  .due-pill.soon{color:var(--accent); font-weight:700;}

  .empty-state{
    text-align:center;
    color:var(--ink-soft);
    padding:36px 12px;
    font-size:var(--fs-sm);
  }

  /* ---------- FAB ---------- */
  .fab{
    position:absolute;
    right:18px;
    bottom: calc(78px + var(--safe-bottom));
    width:56px; height:56px;
    border-radius:50%;
    background:var(--accent);
    color:white;
    border:none;
    font-size:26px;
    box-shadow:0 6px 16px rgba(217,119,87,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:20;
  }
  .fab:active{transform:scale(0.94);}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    flex-shrink:0;
    display:flex;
    background:#15141A;
    padding: 8px 4px calc(8px + var(--safe-bottom));
    border-top:1px solid #2A2832;
  }
  .nav-btn{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none;
    color:#6E6B74;
    font-size: calc(10.5px * var(--font-scale));
    padding:4px 0;
  }
  .nav-btn .nav-icon{font-size:19px; line-height:1;}
  .nav-btn.active{color:var(--accent);}

  /* ---------- Views ---------- */
  .view{display:none;}
  .view.active{display:block;}

  /* ---------- Calendar ---------- */
  .cal-grid{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:4px;
    text-align:center;
  }
  .cal-dow{
    font-size:var(--fs-sm);
    color:var(--ink-soft);
    padding-bottom:6px;
    font-weight:600;
  }
  .cal-day{
    aspect-ratio:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:10px;
    font-size:var(--fs-sm);
    position:relative;
    color:var(--ink);
  }
  .cal-day.other-month{color:#C9C4BA;}
  .cal-day.today{background:var(--ink); color:white; font-weight:700;}
  .cal-day.selected:not(.today){background:var(--accent-soft); font-weight:700;}
  .cal-day .dot{
    width:5px; height:5px; border-radius:50%;
    background:var(--accent);
    margin-top:2px;
    position:absolute;
    bottom:5px;
  }
  .cal-day.today .dot{background:white;}
  .cal-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .cal-nav .cal-title{font-size:var(--fs-lg); font-weight:700;}
  .cal-nav button{
    background:var(--paper-soft); border:none; width:32px; height:32px;
    border-radius:50%; font-size:16px; color:var(--ink);
  }
  .day-tasks{margin-top:18px;}

  /* ---------- Habits ---------- */
  .habit-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:14px 12px;
    margin-bottom:10px;
  }
  .habit-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .habit-name{font-weight:600; font-size:var(--fs-base);}
  .habit-streak{font-size:var(--fs-sm); color:var(--accent); font-family:"SF Mono",monospace; font-weight:700;}
  .habit-week{display:flex; gap:6px;}
  .habit-day{
    flex:1;
    aspect-ratio:1;
    border-radius:8px;
    background:var(--paper-soft);
    display:flex; align-items:center; justify-content:center;
    font-size:var(--fs-sm);
    color:var(--ink-soft);
    border:1.5px solid transparent;
  }
  .habit-day.done{background:var(--good); color:white;}
  .habit-day.today-marker{border-color:var(--ink);}

  /* ---------- Eisenhower matrix ---------- */
  .matrix{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .matrix-quad{
    border-radius:var(--radius-sm);
    padding:10px;
    min-height:140px;
    border:1px solid var(--line);
  }
  .matrix-quad.q1{background:#F4DCD8;}
  .matrix-quad.q2{background:var(--accent-soft);}
  .matrix-quad.q3{background:#EDEAD8;}
  .matrix-quad.q4{background:#E5E2D8;}
  .matrix-label{font-size:var(--fs-sm); font-weight:700; margin-bottom:8px; opacity:0.75;}
  .matrix-task{
    background:rgba(255,255,255,0.65);
    border-radius:8px;
    padding:6px 8px;
    font-size:var(--fs-sm);
    margin-bottom:6px;
  }

  /* ---------- Pomodoro ---------- */
  .pomo-wrap{
    display:flex; flex-direction:column; align-items:center;
    padding:24px 0 8px;
  }
  .pomo-ring{
    width:220px; height:220px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    position:relative;
    margin-bottom:24px;
  }
  .pomo-ring svg{position:absolute; top:0; left:0; transform:rotate(-90deg);}
  .pomo-time{
    font-family:"SF Mono",monospace;
    font-size:calc(40px * var(--font-scale));
    font-weight:700;
    color:var(--ink);
    z-index:2;
  }
  .pomo-mode{
    font-size:var(--fs-sm);
    color:var(--ink-soft);
    z-index:2;
    margin-top:4px;
  }
  .pomo-controls{display:flex; gap:14px;}
  .pomo-btn{
    padding:12px 28px;
    border-radius:24px;
    border:none;
    font-size:var(--fs-base);
    font-weight:700;
    background:var(--accent);
    color:white;
  }
  .pomo-btn.secondary{background:var(--paper-soft); color:var(--ink);}
  .pomo-count{margin-top:18px; font-size:var(--fs-sm); color:var(--ink-soft);}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:absolute; inset:0;
    background:rgba(0,0,0,0.45);
    z-index:50;
    display:none;
    align-items:flex-end;
  }
  .modal-overlay.show{display:flex;}
  .modal-sheet{
    background:var(--paper);
    width:100%;
    border-radius:22px 22px 0 0;
    padding:20px 18px calc(20px + var(--safe-bottom));
    max-height:85vh;
    overflow-y:auto;
  }
  .modal-title{font-size:var(--fs-lg); font-weight:700; margin-bottom:14px;}
  .field-label{font-size:var(--fs-sm); font-weight:600; color:var(--ink-soft); margin:14px 0 6px;}
  .field-input, .field-select, .field-textarea{
    width:100%;
    background:white;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 12px;
    font-size:var(--fs-base);
    color:var(--ink);
    font-family:inherit;
  }
  .field-row{display:flex; gap:8px;}
  .field-row > *{flex:1;}
  .chip-row{display:flex; gap:8px; flex-wrap:wrap;}
  .chip-option{
    padding:8px 14px;
    border-radius:16px;
    background:var(--paper-soft);
    font-size:var(--fs-sm);
    color:var(--ink-soft);
    border:1.5px solid transparent;
  }
  .chip-option.selected{
    background:var(--accent-soft);
    color:var(--accent);
    border-color:var(--accent);
    font-weight:700;
  }
  .modal-actions{
    display:flex; gap:10px; margin-top:20px;
  }
  .btn-primary{
    flex:1;
    background:var(--ink);
    color:white;
    border:none;
    padding:13px;
    border-radius:12px;
    font-size:var(--fs-base);
    font-weight:700;
  }
  .btn-ghost{
    background:none;
    border:none;
    color:var(--ink-soft);
    padding:13px 18px;
    font-size:var(--fs-base);
  }

  /* ---------- Settings ---------- */
  .settings-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 4px;
    border-bottom:1px solid var(--line);
  }
  .settings-label{font-size:var(--fs-base); font-weight:500;}
  .settings-sub{font-size:var(--fs-sm); color:var(--ink-soft); margin-top:2px;}
  .font-stepper{display:flex; align-items:center; gap:14px;}
  .font-stepper button{
    width:32px; height:32px; border-radius:50%;
    background:var(--paper-soft); border:none; font-size:16px; font-weight:700; color:var(--ink);
  }
  .font-stepper .font-pct{font-family:"SF Mono",monospace; font-size:var(--fs-sm); min-width:42px; text-align:center;}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div>
      <h1 id="topTitle">오늘할일</h1>
      <div class="date-sub" id="topDate"></div>
    </div>
    <button class="icon-btn" onclick="openSettings()">⚙︎</button>
  </div>

  <div class="main-scroll" id="mainScroll">

    <!-- ===== HOME / TASKS VIEW ===== -->
    <div class="view active" id="view-home">
      <div class="section-title">
        <span>마감 임박 (D-day)</span>
      </div>
      <div class="dday-strip" id="ddayStrip"></div>

      <div class="section-title">
        <span>오늘</span>
        <span class="count" id="todayCount">0</span>
      </div>
      <div id="todayTasks"></div>

      <div class="section-title" style="margin-top:18px;">
        <span>전체 할 일</span>
        <span class="count" id="allCount">0</span>
      </div>
      <div id="allTasks"></div>
    </div>

    <!-- ===== CALENDAR VIEW ===== -->
    <div class="view" id="view-calendar">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="day-tasks" id="dayTasks"></div>
    </div>

    <!-- ===== HABITS VIEW ===== -->
    <div class="view" id="view-habits">
      <div class="section-title">
        <span>습관</span>
        <span class="count" id="habitCount">0</span>
      </div>
      <div id="habitsList"></div>
    </div>

    <!-- ===== MATRIX VIEW ===== -->
    <div class="view" id="view-matrix">
      <div class="section-title"><span>아이젠하워 매트릭스</span></div>
      <div class="matrix">
        <div class="matrix-quad q1">
          <div class="matrix-label">🔥 긴급 + 중요</div>
          <div id="matrix-q1"></div>
        </div>
        <div class="matrix-quad q2">
          <div class="matrix-label">🎯 안긴급 + 중요</div>
          <div id="matrix-q2"></div>
        </div>
        <div class="matrix-quad q3">
          <div class="matrix-label">⚡ 긴급 + 안중요</div>
          <div id="matrix-q3"></div>
        </div>
        <div class="matrix-quad q4">
          <div class="matrix-label">🌙 안긴급 + 안중요</div>
          <div id="matrix-q4"></div>
        </div>
      </div>
      <div style="font-size:var(--fs-sm); color:var(--ink-soft); margin-top:14px; text-align:center;">
        할 일 추가할 때 우선순위로 분류돼요
      </div>
    </div>

    <!-- ===== POMODORO VIEW ===== -->
    <div class="view" id="view-pomo">
      <div class="pomo-wrap">
        <div class="pomo-ring">
          <svg width="220" height="220" viewBox="0 0 220 220">
            <circle cx="110" cy="110" r="100" fill="none" stroke="#EDEAE2" stroke-width="12"/>
            <circle id="pomoArc" cx="110" cy="110" r="100" fill="none" stroke="#D97757" stroke-width="12"
              stroke-dasharray="628" stroke-dashoffset="0" stroke-linecap="round"/>
          </svg>
          <div style="text-align:center;">
            <div class="pomo-time" id="pomoTime">25:00</div>
            <div class="pomo-mode" id="pomoMode">집중 시간</div>
          </div>
        </div>
        <div class="pomo-controls">
          <button class="pomo-btn secondary" onclick="resetPomo()">초기화</button>
          <button class="pomo-btn" id="pomoToggle" onclick="togglePomo()">시작</button>
        </div>
        <div class="pomo-count">오늘 완료한 뽀모도로: <span id="pomoSessions">0</span>개</div>
      </div>
    </div>

  </div>

  <button class="fab" id="fabBtn" onclick="openTaskModal()">+</button>

  <div class="bottom-nav">
    <button class="nav-btn active" data-view="home" onclick="switchView('home')">
      <span class="nav-icon">☑︎</span><span>할일</span>
    </button>
    <button class="nav-btn" data-view="calendar" onclick="switchView('calendar')">
      <span class="nav-icon">▦</span><span>캘린더</span>
    </button>
    <button class="nav-btn" data-view="habits" onclick="switchView('habits')">
      <span class="nav-icon">↻</span><span>습관</span>
    </button>
    <button class="nav-btn" data-view="matrix" onclick="switchView('matrix')">
      <span class="nav-icon">▣</span><span>매트릭스</span>
    </button>
    <button class="nav-btn" data-view="pomo" onclick="switchView('pomo')">
      <span class="nav-icon">◷</span><span>타이머</span>
    </button>
  </div>

  <!-- ===== TASK MODAL ===== -->
  <div class="modal-overlay" id="taskModalOverlay" onclick="if(event.target===this) closeTaskModal()">
    <div class="modal-sheet">
      <div class="modal-title" id="taskModalTitle">새 할 일</div>
      <input type="hidden" id="editingTaskId">

      <div class="field-label">제목</div>
      <input class="field-input" id="taskTitleInput" placeholder="무엇을 해야 하나요?">

      <div class="field-label">마감일</div>
      <input class="field-input" type="date" id="taskDueInput">

      <div class="field-label">프로젝트</div>
      <input class="field-input" id="taskProjectInput" placeholder="예: 업무, 개인, 학교 (선택)">

      <div class="field-label">태그</div>
      <input class="field-input" id="taskTagInput" placeholder="예: 긴급, 전화 (쉼표로 구분)">

      <div class="field-label">우선순위</div>
      <div class="chip-row" id="prioChips">
        <div class="chip-option" data-prio="high">높음</div>
        <div class="chip-option" data-prio="mid">중간</div>
        <div class="chip-option" data-prio="low">낮음</div>
      </div>

      <div class="field-label">아이젠하워 분류</div>
      <div class="chip-row" id="quadChips">
        <div class="chip-option" data-quad="q1">긴급+중요</div>
        <div class="chip-option" data-quad="q2">안긴급+중요</div>
        <div class="chip-option" data-quad="q3">긴급+안중요</div>
        <div class="chip-option" data-quad="q4">안긴급+안중요</div>
      </div>

      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeTaskModal()">취소</button>
        <button class="btn-primary" onclick="saveTask()">저장</button>
      </div>
    </div>
  </div>

  <!-- ===== HABIT MODAL ===== -->
  <div class="modal-overlay" id="habitModalOverlay" onclick="if(event.target===this) closeHabitModal()">
    <div class="modal-sheet">
      <div class="modal-title">새 습관</div>
      <div class="field-label">습관 이름</div>
      <input class="field-input" id="habitNameInput" placeholder="예: 물 2L 마시기">
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeHabitModal()">취소</button>
        <button class="btn-primary" onclick="saveHabit()">저장</button>
      </div>
    </div>
  </div>

  <!-- ===== SETTINGS MODAL ===== -->
  <div class="modal-overlay" id="settingsModalOverlay" onclick="if(event.target===this) closeSettings()">
    <div class="modal-sheet">
      <div class="modal-title">설정</div>

      <div class="settings-row">
        <div>
          <div class="settings-label">글자 크기</div>
          <div class="settings-sub">앱 전체 텍스트 크기를 조절해요</div>
        </div>
        <div class="font-stepper">
          <button onclick="changeFontScale(-0.1)">−</button>
          <span class="font-pct" id="fontPct">100%</span>
          <button onclick="changeFontScale(0.1)">+</button>
        </div>
      </div>

      <div class="settings-row" style="border-bottom:none;">
        <div>
          <div class="settings-label">모든 데이터 초기화</div>
          <div class="settings-sub">할 일, 습관, 기록을 모두 삭제해요</div>
        </div>
        <button class="btn-ghost" style="color:var(--danger); padding:8px 12px;" onclick="resetAllData()">초기화</button>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" onclick="closeSettings()">닫기</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ============ STATE ============ */
const STORAGE_KEY = 'ttclone_data_v1';

let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    tasks: [],
    habits: [],
    pomoSessions: {}, // date string -> count
    fontScale: 1,
    nextId: 1
  };
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysBetween(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr+'T00:00:00');
  return Math.round((target-today)/(1000*60*60*24));
}

/* ============ INIT ============ */
function init(){
  document.getElementById('fontPct').textContent = Math.round(state.fontScale*100)+'%';
  document.documentElement.style.setProperty('--font-scale', state.fontScale);

  const now = new Date();
  document.getElementById('topDate').textContent =
    now.toLocaleDateString('ko-KR',{month:'long', day:'numeric', weekday:'long'});

  calCursor = new Date();
  renderAll();
  startClockTick();
}

function renderAll(){
  renderHome();
  renderCalendar();
  renderHabits();
  renderMatrix();
}

/* ============ VIEW SWITCHING ============ */
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.nav-btn[data-view="'+name+'"]').classList.add('active');

  document.getElementById('fabBtn').style.display = (name==='pomo') ? 'none' : 'flex';

  const titles = {home:'오늘할일', calendar:'캘린더', habits:'습관', matrix:'매트릭스', pomo:'뽀모도로'};
  document.getElementById('topTitle').textContent = titles[name];

  if(name==='home') renderHome();
  if(name==='calendar') renderCalendar();
  if(name==='habits') renderHabits();
  if(name==='matrix') renderMatrix();
}

/* ============ HOME / D-DAY STRIP / TASK LIST ============ */
function ddayClass(days){
  if(days <= 0) return 'urgent';
  if(days <= 3) return 'soon';
  return '';
}
function ddayLabel(days){
  if(days < 0) return 'D+' + Math.abs(days);
  if(days === 0) return 'D-DAY';
  return 'D-' + days;
}

function renderHome(){
  const incomplete = state.tasks.filter(t=>!t.done);
  const withDue = incomplete.filter(t=>t.due).sort((a,b)=> a.due.localeCompare(b.due));

  const strip = document.getElementById('ddayStrip');
  if(withDue.length === 0){
    strip.innerHTML = '<div class="dday-empty">마감일이 있는 할 일이 없어요</div>';
  } else {
    strip.innerHTML = withDue.slice(0,12).map(t=>{
      const d = daysBetween(t.due);
      const cls = ddayClass(d);
      return `<div class="dday-chip ${cls}">
        <div class="dday-num mono">${ddayLabel(d)}</div>
        <div class="dday-label">${escapeHtml(t.title)}</div>
      </div>`;
    }).join('');
  }

  const today = todayStr();
  const todayTasks = state.tasks.filter(t=> t.due === today);
  document.getElementById('todayCount').textContent = todayTasks.filter(t=>!t.done).length;
  document.getElementById('todayTasks').innerHTML = renderTaskList(todayTasks, '오늘 할 일이 없어요');

  document.getElementById('allCount').textContent = incomplete.length;
  const sortedAll = [...state.tasks].sort((a,b)=>{
    if(a.done !== b.done) return a.done ? 1 : -1;
    if(a.due && b.due) return a.due.localeCompare(b.due);
    if(a.due) return -1;
    if(b.due) return 1;
    return 0;
  });
  document.getElementById('allTasks').innerHTML = renderTaskList(sortedAll, '할 일을 추가해보세요');
}

function renderTaskList(tasks, emptyMsg){
  if(tasks.length === 0){
    return `<div class="empty-state">${emptyMsg}</div>`;
  }
  return tasks.map(t=>{
    const d = t.due ? daysBetween(t.due) : null;
    const dueClass = d!==null ? ddayClass(d) : '';
    const dueText = d!==null ? ddayLabel(d) : '';
    const prioMap = {high:'높음', mid:'중간', low:'낮음'};
    return `
    <div class="task-card">
      <div class="checkbox ${t.done?'checked':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
      <div class="task-body" onclick="editTask(${t.id})">
        <div class="task-title ${t.done?'done':''}">${escapeHtml(t.title)}</div>
        <div class="task-meta">
          ${t.project ? `<span class="tag-pill">${escapeHtml(t.project)}</span>` : ''}
          ${t.priority ? `<span class="prio-pill prio-${t.priority}">${prioMap[t.priority]}</span>` : ''}
          ${(t.tags||[]).map(tag=>`<span class="tag-pill">#${escapeHtml(tag)}</span>`).join('')}
          ${t.due ? `<span class="due-pill ${dueClass} mono">${dueText} · ${t.due.slice(5)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleTask(id){
  const t = state.tasks.find(x=>x.id===id);
  if(t){ t.done = !t.done; saveState(); renderHome(); renderMatrix(); }
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ============ TASK MODAL ============ */
function openTaskModal(taskId){
  document.getElementById('editingTaskId').value = taskId || '';
  document.querySelectorAll('#prioChips .chip-option').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('#quadChips .chip-option').forEach(c=>c.classList.remove('selected'));

  if(taskId){
    const t = state.tasks.find(x=>x.id===taskId);
    document.getElementById('taskModalTitle').textContent = '할 일 수정';
    document.getElementById('taskTitleInput').value = t.title;
    document.getElementById('taskDueInput').value = t.due || '';
    document.getElementById('taskProjectInput').value = t.project || '';
    document.getElementById('taskTagInput').value = (t.tags||[]).join(', ');
    if(t.priority) document.querySelector(`#prioChips [data-prio="${t.priority}"]`).classList.add('selected');
    if(t.quad) document.querySelector(`#quadChips [data-quad="${t.quad}"]`).classList.add('selected');
  } else {
    document.getElementById('taskModalTitle').textContent = '새 할 일';
    document.getElementById('taskTitleInput').value = '';
    document.getElementById('taskDueInput').value = '';
    document.getElementById('taskProjectInput').value = '';
    document.getElementById('taskTagInput').value = '';
  }
  document.getElementById('taskModalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('taskTitleInput').focus(), 100);
}
function editTask(id){ openTaskModal(id); }
function closeTaskModal(){
  document.getElementById('taskModalOverlay').classList.remove('show');
}

document.getElementById('prioChips').addEventListener('click', e=>{
  const chip = e.target.closest('.chip-option');
  if(!chip) return;
  const wasSelected = chip.classList.contains('selected');
  document.querySelectorAll('#prioChips .chip-option').forEach(c=>c.classList.remove('selected'));
  if(!wasSelected) chip.classList.add('selected');
});
document.getElementById('quadChips').addEventListener('click', e=>{
  const chip = e.target.closest('.chip-option');
  if(!chip) return;
  const wasSelected = chip.classList.contains('selected');
  document.querySelectorAll('#quadChips .chip-option').forEach(c=>c.classList.remove('selected'));
  if(!wasSelected) chip.classList.add('selected');
});

function saveTask(){
  const title = document.getElementById('taskTitleInput').value.trim();
  if(!title){ document.getElementById('taskTitleInput').focus(); return; }
  const due = document.getElementById('taskDueInput').value || null;
  const project = document.getElementById('taskProjectInput').value.trim();
  const tagsRaw = document.getElementById('taskTagInput').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
  const prioEl = document.querySelector('#prioChips .chip-option.selected');
  const priority = prioEl ? prioEl.dataset.prio : null;
  const quadEl = document.querySelector('#quadChips .chip-option.selected');
  const quad = quadEl ? quadEl.dataset.quad : null;

  const editingId = document.getElementById('editingTaskId').value;
  if(editingId){
    const t = state.tasks.find(x=>x.id===Number(editingId));
    Object.assign(t, {title, due, project, tags, priority, quad});
  } else {
    state.tasks.push({
      id: state.nextId++,
      title, due, project, tags, priority, quad,
      done:false, createdAt: Date.now()
    });
  }
  saveState();
  closeTaskModal();
  renderHome(); renderCalendar(); renderMatrix();
}

/* ============ CALENDAR ============ */
let calCursor = new Date();
let selectedDate = todayStr();

function changeMonth(delta){
  calCursor.setMonth(calCursor.getMonth()+delta);
  renderCalendar();
}

function renderCalendar(){
  const year = calCursor.getFullYear();
  const month = calCursor.getMonth();
  document.getElementById('calTitle').textContent = `${year}년 ${month+1}월`;

  const grid = document.getElementById('calGrid');
  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  const tasksByDate = {};
  state.tasks.forEach(t=>{ if(t.due){ tasksByDate[t.due] = (tasksByDate[t.due]||0)+1; } });

  const cells = [];
  for(let i=0;i<startOffset;i++){
    cells.push({day: daysInPrevMonth-startOffset+i+1, other:true});
  }
  for(let d=1; d<=daysInMonth; d++){
    cells.push({day:d, other:false, y:year, m:month});
  }
  while(cells.length % 7 !== 0){
    cells.push({day: cells.length - (startOffset+daysInMonth) + 1, other:true});
  }

  const todayS = todayStr();
  cells.forEach(c=>{
    if(c.other){
      html += `<div class="cal-day other-month">${c.day}</div>`;
    } else {
      const ds = `${c.y}-${String(c.m+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
      const isToday = ds === todayS;
      const isSelected = ds === selectedDate;
      const hasDot = tasksByDate[ds] > 0;
      html += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDate('${ds}')">
        ${c.day}${hasDot?'<span class="dot"></span>':''}
      </div>`;
    }
  });

  grid.innerHTML = html;
  renderDayTasks();
}

function selectDate(ds){
  selectedDate = ds;
  renderCalendar();
}

function renderDayTasks(){
  const tasks = state.tasks.filter(t=>t.due === selectedDate);
  const dateObj = new Date(selectedDate+'T00:00:00');
  const label = dateObj.toLocaleDateString('ko-KR',{month:'long', day:'numeric', weekday:'short'});
  document.getElementById('dayTasks').innerHTML =
    `<div class="section-title"><span>${label}</span></div>` +
    renderTaskList(tasks, '이 날짜에 할 일이 없어요');
}

/* ============ HABITS ============ */
function openHabitModal(){
  document.getElementById('habitNameInput').value = '';
  document.getElementById('habitModalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('habitNameInput').focus(), 100);
}
function closeHabitModal(){
  document.getElementById('habitModalOverlay').classList.remove('show');
}
function saveHabit(){
  const name = document.getElementById('habitNameInput').value.trim();
  if(!name) return;
  state.habits.push({ id: state.nextId++, name, log: {} });
  saveState();
  closeHabitModal();
  renderHabits();
}

function getWeekDates(){
  const dates = [];
  const now = new Date();
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((dow+6)%7));
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    dates.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
  }
  return dates;
}

function calcStreak(habit){
  let streak = 0;
  let d = new Date();
  while(true){
    const ds = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(habit.log[ds]){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function renderHabits(){
  document.getElementById('habitCount').textContent = state.habits.length;
  const week = getWeekDates();
  const today = todayStr();
  const dowLabels = ['월','화','수','목','금','토','일'];

  if(state.habits.length===0){
    document.getElementById('habitsList').innerHTML =
      '<div class="empty-state">습관을 추가해보세요</div>' +
      '<button class="btn-primary" style="margin-top:12px;" onclick="openHabitModal()">+ 습관 추가</button>';
    return;
  }

  let html = state.habits.map(h=>{
    const streak = calcStreak(h);
    const days = week.map((ds,i)=>{
      const done = !!h.log[ds];
      const isToday = ds === today;
      return `<div class="habit-day ${done?'done':''} ${isToday?'today-marker':''}" onclick="toggleHabit(${h.id}, '${ds}')">
        ${done?'✓':dowLabels[i]}
      </div>`;
    }).join('');
    return `<div class="habit-card">
      <div class="habit-head">
        <div class="habit-name">${escapeHtml(h.name)}</div>
        <div class="habit-streak mono">🔥${streak}</div>
      </div>
      <div class="habit-week">${days}</div>
    </div>`;
  }).join('');

  html += '<button class="btn-primary" style="margin-top:8px;" onclick="openHabitModal()">+ 습관 추가</button>';
  document.getElementById('habitsList').innerHTML = html;
}

function toggleHabit(id, ds){
  const h = state.habits.find(x=>x.id===id);
  if(!h) return;
  h.log[ds] = !h.log[ds];
  saveState();
  renderHabits();
}

/* ============ MATRIX ============ */
function renderMatrix(){
  ['q1','q2','q3','q4'].forEach(q=>{
    const tasks = state.tasks.filter(t=>t.quad===q && !t.done);
    const el = document.getElementById('matrix-'+q);
    if(tasks.length===0){
      el.innerHTML = '<div style="font-size:var(--fs-sm); opacity:0.5;">없음</div>';
    } else {
      el.innerHTML = tasks.map(t=>
        `<div class="matrix-task" onclick="editTask(${t.id})">${escapeHtml(t.title)}</div>`
      ).join('');
    }
  });
}

/* ============ POMODORO ============ */
let pomoSeconds = 25*60;
let pomoTotal = 25*60;
let pomoRunning = false;
let pomoTimer = null;
let pomoIsBreak = false;
const FOCUS_SEC = 25*60;
const BREAK_SEC = 5*60;
const ARC_LEN = 628;

function updatePomoDisplay(){
  const m = Math.floor(pomoSeconds/60);
  const s = pomoSeconds%60;
  document.getElementById('pomoTime').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('pomoMode').textContent = pomoIsBreak ? '휴식 시간' : '집중 시간';
  const progress = 1 - (pomoSeconds/pomoTotal);
  document.getElementById('pomoArc').setAttribute('stroke-dashoffset', ARC_LEN*progress);
  document.getElementById('pomoArc').setAttribute('stroke', pomoIsBreak ? '#5B8C5A' : '#D97757');

  const todayS = todayStr();
  document.getElementById('pomoSessions').textContent = state.pomoSessions[todayS] || 0;
}

function togglePomo(){
  pomoRunning = !pomoRunning;
  document.getElementById('pomoToggle').textContent = pomoRunning ? '일시정지' : '시작';
  if(pomoRunning){
    pomoTimer = setInterval(()=>{
      pomoSeconds--;
      if(pomoSeconds <= 0){
        if(!pomoIsBreak){
          const todayS = todayStr();
          state.pomoSessions[todayS] = (state.pomoSessions[todayS]||0)+1;
          saveState();
        }
        pomoIsBreak = !pomoIsBreak;
        pomoTotal = pomoIsBreak ? BREAK_SEC : FOCUS_SEC;
        pomoSeconds = pomoTotal;
      }
      updatePomoDisplay();
    }, 1000);
  } else {
    clearInterval(pomoTimer);
  }
}
function resetPomo(){
  clearInterval(pomoTimer);
  pomoRunning = false;
  pomoIsBreak = false;
  pomoTotal = FOCUS_SEC;
  pomoSeconds = FOCUS_SEC;
  document.getElementById('pomoToggle').textContent = '시작';
  updatePomoDisplay();
}

/* ============ SETTINGS ============ */
function openSettings(){
  document.getElementById('settingsModalOverlay').classList.add('show');
}
function closeSettings(){
  document.getElementById('settingsModalOverlay').classList.remove('show');
}
function changeFontScale(delta){
  let scale = Math.round((state.fontScale + delta)*10)/10;
  scale = Math.max(0.8, Math.min(1.5, scale));
  state.fontScale = scale;
  document.documentElement.style.setProperty('--font-scale', scale);
  document.getElementById('fontPct').textContent = Math.round(scale*100)+'%';
  saveState();
}
function resetAllData(){
  if(confirm('정말 모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없어요.')){
    state = { tasks:[], habits:[], pomoSessions:{}, fontScale: state.fontScale, nextId:1 };
    saveState();
    renderAll();
    closeSettings();
  }
}

/* ============ CLOCK TICK (for D-day rollover at midnight) ============ */
function startClockTick(){
  setInterval(()=>{
    const view = document.querySelector('.view.active').id;
    if(view==='view-home') renderHome();
  }, 60000);
}

/* ============ INIT ON LOAD ============ */
window.addEventListener('load', init);

/* ============ SERVICE WORKER (PWA) ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
